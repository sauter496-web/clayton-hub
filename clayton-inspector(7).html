<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Clayton Inspector">
<meta name="theme-color" content="#1E1E1E">
<title>Clayton Hotel Düsseldorf — Room Inspection</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --copper: #C17F34;
  --copper-dark: #A06A28;
  --copper-light: #D4A054;
  --copper-bg: #FDF5EC;
  --dark: #1E1E1E;
  --dark2: #3A3A3A;
  --warm-white: #FAFAF5;
  --cream: #F3EDE4;
  --cream2: #E8E0D4;
  --gray: #8A8478;
  --gray2: #B5AFA5;
  --border: #DDD5CA;
  --green: #3A8F6E;
  --green-bg: #EDF7F2;
  --red: #C0392B;
  --red-bg: #FDECEA;
  --orange: #D4851F;
  --orange-bg: #FEF4E8;
  --purple: #7C3AED;
  --purple-bg: #EDE9FE;
  --card-bg: rgba(255,255,255,.92);
  --glass: rgba(255,255,255,.75);
  --r: 8px;
  --rl: 14px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'Source Sans 3',sans-serif;color:var(--dark);-webkit-font-smoothing:antialiased;background:#1a1a1a}

/* ── FULL-WIDTH APP WITH BG IMAGE ── */
.app {
  width:100%;
  min-height:100vh;
  position:relative;
  background:
    url('https://media.claytonhotels.com/image/upload/f_auto,c_auto,w_1920,q_auto/v1710849577/MigratedClaytonAssets/clayton-hotel-duesseldorf/superior_room_lj99bx.jpg') center center/cover no-repeat fixed;
}
.app::before {
  content:'';
  position:fixed;
  inset:0;
  background:rgba(243,237,228,.82);
  z-index:0;
  pointer-events:none;
}
.app > * { position:relative; z-index:1; }

/* ── HEADER ── */
.hdr {
  padding:20px 24px 0;
  position:sticky;top:0;z-index:100;
  background:rgba(30,30,30,.7);
  backdrop-filter:blur(16px);
}
.hdr-top{display:flex;justify-content:space-between;align-items:center;padding-bottom:10px}
.hdr-logo{height:28px;filter:brightness(0) invert(1);opacity:.95}
.hdr-date{font-size:12px;color:rgba(255,255,255,.5);text-align:center;padding-bottom:12px}
.hdr-set{background:none;border:none;color:rgba(255,255,255,.6);cursor:pointer;padding:4px}

/* ── NAV ── */
.nav{display:flex;gap:2px;padding:0 24px 12px}
.nb{flex:1;padding:9px 4px 8px;border:none;background:rgba(255,255,255,.08);color:rgba(255,255,255,.55);font-size:9.5px;font-weight:600;font-family:inherit;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;text-transform:uppercase;letter-spacing:.8px;border-radius:8px;transition:.2s}
.nb:first-child{border-radius:8px 0 0 8px}.nb:last-child{border-radius:0 8px 8px 0}
.nb.on{background:var(--copper);color:#fff}
.nb svg{opacity:.6;width:16px;height:16px}.nb.on svg{opacity:1}

/* ── CONTENT ── */
.cnt{padding:20px 24px 40px;display:none;max-width:900px;margin:0 auto}
.cnt.vis{display:block;animation:fi .3s ease}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── TYPOGRAPHY ── */
.serif{font-family:'Libre Baskerville',serif}
.h1{font-family:'Libre Baskerville',serif;font-size:24px;font-weight:700;color:var(--dark);line-height:1.3}
.h2{font-family:'Libre Baskerville',serif;font-size:17px;font-weight:700;color:var(--dark)}
.h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--gray)}
.sub{font-size:13px;color:var(--gray)}

/* ── CARDS ── */
.card{background:var(--card-bg);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:var(--rl);padding:18px;margin-bottom:14px;transition:box-shadow .2s}
.card:hover{box-shadow:0 4px 20px rgba(0,0,0,.06)}
.card-accent{border-left:4px solid var(--copper)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:12px 22px;border:none;border-radius:var(--r);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.2px}
.b1{background:var(--copper);color:#fff}.b1:hover{background:var(--copper-dark);box-shadow:0 4px 12px rgba(193,127,52,.3)}
.b2{background:var(--green);color:#fff}
.b3{background:var(--red);color:#fff}
.b0{background:var(--card-bg);border:1.5px solid var(--border);color:var(--dark2)}.b0:hover{border-color:var(--copper);color:var(--copper)}
.bs{padding:8px 14px;font-size:12px}.bf{width:100%}.btn:disabled{opacity:.3;cursor:not-allowed}

/* ── FORM ── */
.fg{margin-bottom:16px}
.lbl{display:block;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--gray);margin-bottom:6px}
input[type=text],input[type=password],select,textarea{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:var(--r);font-family:inherit;font-size:14px;color:var(--dark);background:var(--warm-white);transition:.2s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--copper);box-shadow:0 0 0 3px rgba(193,127,52,.1)}
textarea{min-height:70px;resize:vertical}
select{appearance:none;cursor:pointer}

/* ── SEARCH ── */
.srch{position:relative;margin-bottom:12px}
.srch svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--gray2);pointer-events:none}
.srch input{padding-left:42px}

/* ── PILLS ── */
.pills{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch}
.pills::-webkit-scrollbar{height:0}
.pill{flex-shrink:0;padding:7px 16px;border:1.5px solid var(--border);border-radius:24px;background:var(--card-bg);color:var(--dark2);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:.2s;backdrop-filter:blur(4px)}
.pill.on{background:var(--copper);color:#fff;border-color:var(--copper)}

/* ── ROOM LIST ── */
.rlist{max-height:360px;overflow-y:auto;border:1.5px solid var(--border);border-radius:var(--rl);background:var(--card-bg);backdrop-filter:blur(8px)}
.rlist::-webkit-scrollbar{width:5px}.rlist::-webkit-scrollbar-thumb{background:var(--copper-light);border-radius:3px}
.ri{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;border-bottom:1px solid var(--cream2);cursor:pointer;transition:.15s}
.ri:last-child{border-bottom:none}.ri:hover{background:var(--copper-bg)}
.rn{font-weight:700;font-size:18px;color:var(--dark);font-variant-numeric:tabular-nums}
.rc{font-size:11px;color:var(--gray);background:var(--cream);padding:3px 10px;border-radius:6px;font-weight:500}

/* ── BADGES/TAGS ── */
.bdg{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.bdg-c{background:var(--green-bg);color:var(--green)}.bdg-i{background:var(--red-bg);color:var(--red)}.bdg-d{background:var(--cream);color:var(--gray)}
.tag{display:inline-block;padding:3px 10px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.tag-s{background:var(--red-bg);color:var(--red)}.tag-v{background:var(--orange-bg);color:var(--orange)}.tag-sv{background:var(--purple-bg);color:var(--purple)}.tag-ok{background:var(--green-bg);color:var(--green)}

/* ── PROGRESS ── */
.prog{height:7px;background:var(--cream2);border-radius:4px;overflow:hidden;margin:8px 0}
.pf{height:100%;border-radius:4px;transition:width .5s}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.stat{background:var(--card-bg);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:var(--rl);padding:18px 12px;text-align:center}
.stat-v{font-family:'Libre Baskerville',serif;font-size:30px;font-weight:700;line-height:1}
.stat-l{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:var(--gray);margin-top:6px}

/* ── ROOM HERO ── */
.rh{position:relative;border-radius:var(--rl);overflow:hidden;margin-bottom:18px;height:160px;background:url('https://media.claytonhotels.com/image/upload/f_auto,c_auto,w_960,q_auto/v1710849577/MigratedClaytonAssets/clayton-hotel-duesseldorf/superior_room_lj99bx.jpg') center/cover}
.rh::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(30,30,30,.4),rgba(30,30,30,.75))}
.rh-c{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;color:#fff}
.rh-f{font-size:10px;opacity:.5;text-transform:uppercase;letter-spacing:3px}
.rh-n{font-family:'Libre Baskerville',serif;font-size:48px;font-weight:700;line-height:1}
.rh-cat{font-size:14px;opacity:.7;margin-top:4px;letter-spacing:.3px}

/* ── UPLOAD ── */
.upload{border:2px dashed var(--border);border-radius:var(--rl);padding:28px;text-align:center;cursor:pointer;transition:.2s;background:var(--cream)}
.upload:hover{border-color:var(--copper);background:var(--copper-bg)}

/* ── PHOTO GRID ── */
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}
.pgi{position:relative;aspect-ratio:1;border-radius:var(--r);overflow:hidden;border:2px solid var(--border)}
.pgi img{width:100%;height:100%;object-fit:cover}
.pgr{position:absolute;top:5px;right:5px;width:26px;height:26px;border-radius:50%;background:rgba(0,0,0,.55);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700}
.pgs{position:absolute;bottom:0;left:0;right:0;padding:4px 0;text-align:center;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#fff}

/* ── AI CARD ── */
.ai{background:var(--copper-bg);border:1px solid rgba(193,127,52,.2);border-radius:var(--rl);padding:16px;margin-top:10px}
.ai-h{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--copper-dark);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}

/* ── REPORT ENTRY ── */
.rpt{border:1px solid var(--border);border-radius:var(--rl);padding:16px;margin-bottom:12px;background:var(--card-bg);backdrop-filter:blur(8px);transition:box-shadow .2s}
.rpt:hover{box-shadow:0 4px 20px rgba(0,0,0,.06)}
.rpt-rm{font-family:'Libre Baskerville',serif;font-weight:700;font-size:17px}
.rpt-img{width:100%;max-height:180px;object-fit:cover;border-radius:var(--r);margin:10px 0}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse;margin-top:12px}
.tbl th{text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--gray);padding:10px 8px;border-bottom:2px solid var(--border)}
.tbl td{padding:10px 8px;font-size:13px;border-bottom:1px solid var(--cream2);vertical-align:top}

/* ── MODALS ── */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.mo.vis{display:flex}
.ms{background:var(--warm-white);border-radius:18px 18px 0 0;width:100%;max-width:600px;max-height:92vh;overflow-y:auto;padding:22px 24px 34px;animation:su .3s ease}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mb-bar{width:40px;height:4px;background:var(--cream2);border-radius:2px;margin:0 auto 16px}
.cf{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:center;justify-content:center;padding:24px}
.cf.vis{display:flex}
.cfb{background:#fff;border-radius:var(--rl);padding:28px;max-width:380px;width:100%;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,.15)}
.cfb p{margin-bottom:20px;font-size:15px;line-height:1.5}

/* ── MISC ── */
.clb{background:var(--cream);border:1px solid var(--border);border-radius:var(--rl);padding:18px;text-align:center;margin-bottom:18px;display:none}
.clb.vis{display:block}
.clb h3{font-family:'Libre Baskerville',serif;font-size:15px}
.clb p{font-size:12px;color:var(--gray);margin-top:3px}
.empty{text-align:center;padding:48px 24px;color:var(--gray)}
.divider{height:1px;background:var(--border);margin:20px 0}
.pulse{animation:pls 1.5s infinite}
@keyframes pls{0%,100%{opacity:1}50%{opacity:.3}}
.flex{display:flex}.gap-2{gap:10px}.gap-1{gap:6px}.mt-2{margin-top:14px}.mt-3{margin-top:20px}.mb-2{margin-bottom:14px}.mb-1{margin-bottom:8px}
.between{justify-content:space-between}.items-c{align-items:center}.items-s{align-items:flex-start}.wrap{flex-wrap:wrap}
.hidden{display:none!important}

/* ── FLOOR GRID ── */
.fl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}

/* ── SYNC INDICATOR ── */
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.sync-live{background:#3A8F6E;box-shadow:0 0 6px rgba(58,143,110,.5);animation:syncpulse 2s infinite}
@keyframes syncpulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── RESPONSIVE: iPHONE SE / SMALL (< 380px) ── */
@media(max-width:380px){
  .stats{grid-template-columns:1fr 1fr;gap:8px}
  .stat{padding:12px 8px}
  .stat-v{font-size:24px}
  .stat-l{font-size:9px}
  .nav{padding:0 8px 8px;gap:1px}
  .nb{padding:8px 2px 7px;font-size:8px;letter-spacing:.5px}
  .nb svg{width:14px;height:14px}
  .cnt{padding:12px 12px 32px}
  .hdr{padding:12px 12px 0}
  .hdr-logo{height:22px}
  .fl-grid{grid-template-columns:1fr}
  .card{padding:14px;margin-bottom:10px}
  .h2{font-size:15px}
  .pgrid{grid-template-columns:repeat(2,1fr);gap:6px}
  .rh-n{font-size:36px}
  .rpt-rm{font-size:15px}
  .btn{padding:10px 16px;font-size:13px}
  .pills{gap:4px}
  .pill{padding:5px 12px;font-size:11px}
  .ri{padding:10px 12px}
  .rn{font-size:16px}
}

/* ── RESPONSIVE: iPHONE STANDARD (381-430px) ── */
@media(min-width:381px) and (max-width:430px){
  .stats{grid-template-columns:1fr 1fr;gap:8px}
  .stat-v{font-size:26px}
  .nav{padding:0 12px 8px}
  .nb{padding:9px 3px 8px;font-size:8.5px}
  .cnt{padding:14px 14px 36px}
  .hdr{padding:14px 14px 0}
  .hdr-logo{height:24px}
  .fl-grid{grid-template-columns:1fr}
  .pgrid{grid-template-columns:repeat(3,1fr);gap:8px}
  .rh-n{font-size:40px}
}

/* ── RESPONSIVE: iPHONE PRO MAX / LARGE PHONES (431-640px) ── */
@media(min-width:431px) and (max-width:640px){
  .stats{grid-template-columns:1fr 1fr}
  .nav{padding:0 16px 10px}
  .cnt{padding:16px 16px 40px}
  .hdr{padding:16px 16px 0}
  .fl-grid{grid-template-columns:1fr}
}

/* ── RESPONSIVE: iPAD MINI / iPAD (641-1024px) ── */
@media(min-width:641px) and (max-width:1024px){
  .stats{grid-template-columns:repeat(4,1fr)}
  .cnt{padding:20px 28px 40px}
  .fl-grid{grid-template-columns:repeat(2,1fr)}
  .pgrid{grid-template-columns:repeat(4,1fr)}
  .rlist{max-height:420px}
  .rh{height:180px}
}

/* ── RESPONSIVE: DESKTOP (> 1024px) ── */
@media(min-width:1025px){
  .cnt{padding:24px 32px 48px;max-width:1100px}
  .fl-grid{grid-template-columns:repeat(3,1fr)}
  .pgrid{grid-template-columns:repeat(4,1fr)}
  .rlist{max-height:480px}
}

/* ── iOS SAFE AREAS ── */
@supports(padding-top: env(safe-area-inset-top)){
  .hdr{padding-top:calc(16px + env(safe-area-inset-top))}
  .cnt{padding-bottom:calc(40px + env(safe-area-inset-bottom))}
}

/* ── TOUCH TARGETS (mobile) ── */
@media(hover:none) and (pointer:coarse){
  .ri{padding:14px 16px;min-height:52px}
  .btn{min-height:44px}
  .bs{min-height:38px}
  .pill{min-height:36px;padding:8px 16px}
  .nb{min-height:48px}
  .pgr{width:30px;height:30px;font-size:17px}
}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="hdr">
    <div class="hdr-top">
      <img class="hdr-logo" src="https://media.claytonhotels.com/dalata-assets-2024/image/upload/f_auto,c_auto,w_3840,q_auto/v1710345077/Uploads/Clayton/Clayton_Logo_White_3b4d3c6086.png" alt="Clayton Hotels">
      <button class="hdr-set" onclick="go('settings')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center"><div class="hdr-date" id="hd"></div><div id="sync-ind" style="font-size:10px;color:rgba(255,255,255,.5);display:flex;align-items:center"><span class="sync-dot sync-live"></span>Live</div></div>
    <div class="nav">
      <button class="nb on" data-page="dashboard" onclick="go('dashboard')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</button>
      <button class="nb" data-page="inspect" onclick="go('inspect')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>Inspektion</button>
      <button class="nb" data-page="report" onclick="go('report')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Reports</button>
      <button class="nb" data-page="export" onclick="go('export')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Export</button>
    </div>
  </div>
  <div class="cnt vis" id="pg-dashboard"></div>
  <div class="cnt" id="pg-inspect"></div>
  <div class="cnt" id="pg-report"></div>
  <div class="cnt" id="pg-export"></div>
  <div class="cnt" id="pg-settings"></div>
  <div class="cnt" id="pg-room"></div>
  <div class="mo" id="emo"><div class="ms" id="emo-c"></div></div>
  <div class="cf" id="cdlg"><div class="cfb" id="cdlg-c"></div></div>

// ── DUAL STORAGE: localStorage (persistent local) + window.storage (cross-device sync) ──
function lsG(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}}
function lsS(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){console.warn("localStorage full, clearing images...");cleanOldImages();try{localStorage.setItem(k,JSON.stringify(v))}catch{}}}
function lsD(k){try{localStorage.removeItem(k)}catch{}}

// window.storage for cross-device sync (only works in Claude artifacts)
let hasSharedStorage=false;
async function ssG(k){try{const r=await window.storage.get(k,true);hasSharedStorage=true;return r?JSON.parse(r.value):null}catch{return null}}
async function ssS(k,v){try{await window.storage.set(k,JSON.stringify(v),true);hasSharedStorage=true}catch{}}

// Unified get: try shared first, fall back to local
async function sG(k){
  const shared=await ssG(k);
  if(shared!==null)return shared;
  return lsG(k);
}

// Unified set: save to both
async function sS(k,v){
  lsS(k,v);
  await ssS(k,v);
}

// Save reports without images to storage (images stored separately)
async function sv(){
  // Store reports without base64 images (too large for some storage)
  const rpLite=rp.map(r=>({...r,image:r.image?('img:'+r.id):null}));
  // Store images separately in localStorage only (too large for shared)
  rp.forEach(r=>{if(r.image&&!r.image.startsWith('img:'))lsS('img:'+r.id,r.image)});
  lsS("c6r",rpLite);lsS("c6c",cl);lsS("c6v",Date.now());
  // Sync metadata (without images) to shared storage for cross-device
  await ssS("c6r",rpLite);await ssS("c6c",cl);await ssS("c6v",Date.now());
}

// Load reports and reattach images from localStorage
function loadImages(reports){
  return reports.map(r=>{
    if(r.image&&r.image.startsWith('img:')){
      const img=lsG(r.image);
      return {...r,image:img||null};
    }
    return r;
  });
}

// Clean up orphaned images
function cleanOldImages(){
  const ids=new Set(rp.map(r=>r.id));
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&k.startsWith('img:')&&!ids.has(k.replace('img:','')))lsD(k);
  }
}

(async()=>{

  const localVer=lsG("c6v")||0;

  if(sharedVer>localVer){d=sd;r=sr;c=sc;if(sk)k=sk}
  if(k)ak=k;

// ── REAL-TIME SYNC ──
let lastSyncVersion=0;
let syncActive=true;
async function syncLoop(){
  if(!syncActive)return;
  try{
    // Check both storages for updates
    const sharedVer=(await ssG("c6v"))||0;
    const localVer=lsG("c6v")||0;
    const newestVer=Math.max(sharedVer,localVer);
    if(newestVer>lastSyncVersion){
      lastSyncVersion=newestVer;
      // Load from whichever is newer
      const src=sharedVer>=localVer?"shared":"local";
      const r=src==="shared"?await ssG("c6r"):lsG("c6r");
      const c=src==="shared"?await ssG("c6c"):lsG("c6c");
      const newRp=loadImages(r||[]);const newCl=c||[];
      if(JSON.stringify(newRp.map(x=>x.id))!==JSON.stringify(rp.map(x=>x.id))||JSON.stringify(newCl)!==JSON.stringify(cl)){
        rp=newRp;cl=newCl;
        if(pg!=="room"||!ra){render()}
        updateSyncIndicator(true);
      }

  rp=[];cl=[];dc=false;

  await ssS("c6r",[]);await ssS("c6c",[]);await ssS("c6v",Date.now());
  lastSyncVersion=Date.now();
  document.getElementById("cdlg").classList.remove("vis");
  go("dashboard");
}
async function reopen(){dc=false;render()}

// ── EXPORT FUNCTIONS ──
function exportCSV(){
  const date=new Date().toLocaleDateString('de-DE');
  const ins=gins();
  let csv='sep=;\n';
  csv+='Clayton Hotel Düsseldorf - Tagesreport Zimmerinspektion\n';
  csv+=`Datum;${date}\n`;
  csv+=`Geprüft;${ins} von ${TOT}\n`;
  csv+=`Clean;${cl.length}\n`;
  csv+=`Meldungen;${rp.length}\n\n`;
  csv+='Zimmer;Art;Schweregrad;Abteilung;Beschreibung;KI-Analyse;Uhrzeit\n';
  rp.forEach(r=>{
    const desc=(r.description||'').replace(/;/g,',').replace(/\n/g,' ');
    const ai=(r.aiAnalysis||'').replace(/;/g,',').replace(/\n/g,' ');
    const time=new Date(r.timestamp).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
    csv+=`${r.roomNumber};${r.issueType};${r.severity||'-'};${r.department||'Housekeeping'};${desc};${ai};${time}\n`;
  });
  csv+='\nClean-Zimmer\n';
  csv+=cl.sort((a,b)=>a-b).join('; ')+'\n';
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`Clayton_Inspektion_${td}.csv`;a.click();
  URL.revokeObjectURL(url);
}

function exportJSON(){
  const data={
    hotel:'Clayton Hotel Düsseldorf',
    date:td,
    dateFormatted:new Date().toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long',year:'numeric'}),
    summary:{totalRooms:TOT,inspected:gins(),clean:cl.length,reports:rp.length},
    cleanRooms:cl.sort((a,b)=>a-b),
    reports:rp.map(r=>({room:r.roomNumber,type:r.issueType,severity:r.severity,department:r.department,description:r.description,aiAnalysis:r.aiAnalysis,time:new Date(r.timestamp).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})}))
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`Clayton_Inspektion_${td}.json`;a.click();
  URL.revokeObjectURL(url);
}

function exportHTML(){
  const date=new Date().toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const ins=gins();
  const dm=rp.filter(r=>r.issueType==='Schaden'||r.issueType==='Schaden & Verschmutzung').length;
  const di=rp.filter(r=>r.issueType==='Verschmutzung'||r.issueType==='Schaden & Verschmutzung').length;
  const bd={};rp.forEach(r=>{const d=r.department||'Housekeeping';if(!bd[d])bd[d]=[];bd[d].push(r)});
  let html=`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Clayton Inspektion ${td}</title><style>body{font-family:'Source Sans Pro',Arial,sans-serif;max-width:900px;margin:0 auto;padding:24px;color:#1e1e1e}h1{font-family:Georgia,serif;color:#C17F34;margin-bottom:4px}h2{font-family:Georgia,serif;font-size:18px;margin-top:24px;padding-bottom:6px;border-bottom:2px solid #E8E0D4}table{width:100%;border-collapse:collapse;margin:12px 0}th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#8A8478;padding:8px;border-bottom:2px solid #DDD5CA}td{padding:8px;font-size:13px;border-bottom:1px solid #E8E0D4}.stats{display:flex;gap:24px;margin:16px 0}.stat{text-align:center}.stat-v{font-family:Georgia,serif;font-size:28px;font-weight:700}.stat-l{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#8A8478}.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase}.tag-s{background:#FDECEA;color:#C0392B}.tag-v{background:#FEF4E8;color:#D4851F}.tag-sv{background:#EDE9FE;color:#7C3AED}@media print{body{padding:0}}</style></head><body>`;
  html+=`<h1>Clayton Hotel Düsseldorf</h1><p style="color:#8A8478;margin-bottom:20px">Tagesreport Zimmerinspektion — ${date}</p>`;
  html+=`<div class="stats"><div class="stat"><div class="stat-v" style="color:#C17F34">${ins}/${TOT}</div><div class="stat-l">Geprüft</div></div><div class="stat"><div class="stat-v" style="color:#3A8F6E">${cl.length}</div><div class="stat-l">Clean</div></div><div class="stat"><div class="stat-v" style="color:#C0392B">${dm}</div><div class="stat-l">Schäden</div></div><div class="stat"><div class="stat-v" style="color:#D4851F">${di}</div><div class="stat-l">Verschmutz.</div></div></div>`;
  if(rp.length){
    html+='<h2>Alle Meldungen</h2><table><thead><tr><th>Zimmer</th><th>Art</th><th>Schwere</th><th>Abteilung</th><th>Beschreibung</th><th>Zeit</th></tr></thead><tbody>';
    rp.forEach(r=>{const tg=r.issueType==='Schaden'?'tag-s':r.issueType==='Schaden & Verschmutzung'?'tag-sv':'tag-v';html+=`<tr><td style="font-weight:700">${r.roomNumber}</td><td><span class="tag ${tg}">${r.issueType}</span></td><td>${r.severity||'-'}</td><td>${r.department||'HK'}</td><td>${(r.description||'-').replace(/\n/g,'<br>')}</td><td>${new Date(r.timestamp).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})}</td></tr>`});
    html+='</tbody></table>';
    Object.entries(bd).forEach(([d,items])=>{
      html+=`<h2>${d} (${items.length})</h2><table><thead><tr><th>Zimmer</th><th>Art</th><th>Schwere</th><th>Beschreibung</th></tr></thead><tbody>`;
      items.forEach(i=>{const tg=i.issueType==='Schaden'?'tag-s':i.issueType==='Schaden & Verschmutzung'?'tag-sv':'tag-v';html+=`<tr><td style="font-weight:700">${i.roomNumber}</td><td><span class="tag ${tg}">${i.issueType}</span></td><td>${i.severity||'-'}</td><td>${(i.description||'-').replace(/\n/g,'<br>')}</td></tr>`});
      html+='</tbody></table>';
    });
  }
  html+=`<h2>Clean-Zimmer (${cl.length})</h2><p style="color:#8A8478;line-height:1.8">${cl.sort((a,b)=>a-b).join(', ')}</p>`;
  html+='</body></html>';
  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`Clayton_Inspektion_${td}.html`;a.click();
  URL.revokeObjectURL(url);
}
function cfDel(id){document.getElementById("cdlg-c").innerHTML=`<p>Meldung wirklich löschen?</p><div class="flex gap-2" style="margin-top:16px"><button class="btn b0 bs" style="flex:1" onclick="document.getElementById('cdlg').classList.remove('vis')">Abbrechen</button><button class="btn b3 bs" style="flex:1" onclick="delR('${id}')">Löschen</button></div>`;document.getElementById("cdlg").classList.add("vis")}
function delR(id){lsD('img:'+id);rp=rp.filter(r=>r.id!==id);sv();document.getElementById("cdlg").classList.remove("vis");render()}
function rmImg(id){
  document.getElementById("cdlg-c").innerHTML=`<p>Bild aus dieser Meldung entfernen?</p><div class="flex gap-2" style="margin-top:16px"><button class="btn b0 bs" style="flex:1" onclick="document.getElementById('cdlg').classList.remove('vis')">Abbrechen</button><button class="btn b1 bs" style="flex:1" onclick="doRmImg('${id}')">Bild entfernen</button></div>`;
  document.getElementById("cdlg").classList.add("vis");
}
function doRmImg(id){const r=rp.find(x=>x.id===id);if(r){lsD('img:'+id);r.image=null;r.lastEdited=new Date().toISOString()}sv();document.getElementById("cdlg").classList.remove("vis");render()}
function editR(id){const r=rp.find(x=>x.id===id);if(!r)return;let h='<div class="mb-bar"></div><div class="flex between items-c mb-2"><div class="serif" style="font-size:18px;font-weight:700">Meldung bearbeiten</div><button class="btn b0 bs" style="padding:6px" onclick="document.getElementById(\'emo\').classList.remove(\'vis\')">✕</button></div>';
h+=`<div style="font-size:15px;margin-bottom:12px">Zimmer <strong>${r.roomNumber}</strong></div>`;if(r.image)h+=`<img src="${r.image}" style="width:100%;max-height:200px;object-fit:cover;border-radius:10px;margin-bottom:14px">`;
h+=`<div class="fg"><div class="lbl">Art des Problems</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px"><button class="btn bs et ${r.issueType==='Verschmutzung'?'b1':'b0'}" onclick="document.querySelectorAll('.et').forEach(b=>{b.classList.remove('b1');b.classList.add('b0')});this.classList.remove('b0');this.classList.add('b1');document.getElementById('et').value='Verschmutzung'">🧹 Verschmutzung</button><button class="btn bs et ${r.issueType==='Schaden'?'b1':'b0'}" onclick="document.querySelectorAll('.et').forEach(b=>{b.classList.remove('b1');b.classList.add('b0')});this.classList.remove('b0');this.classList.add('b1');document.getElementById('et').value='Schaden'">⚠️ Schaden</button><button class="btn bs et ${r.issueType==='Schaden & Verschmutzung'?'b1':'b0'}" onclick="document.querySelectorAll('.et').forEach(b=>{b.classList.remove('b1');b.classList.add('b0')});this.classList.remove('b0');this.classList.add('b1');document.getElementById('et').value='Schaden & Verschmutzung'">⚠️🧹 Beides</button></div><input type="hidden" id="et" value="${r.issueType}"></div>`;
h+=`<div class="fg"><div class="lbl">Abteilung</div><select id="edp">${DP.map(d=>`<option ${d===r.department?'selected':''}>${d}</option>`).join('')}</select></div>`;
h+=`<div class="fg"><div class="lbl">Beschreibung</div><textarea id="edd">${r.description||''}</textarea></div>`;
h+=`<button class="btn b1 bf" onclick="svEd('${r.id}')">Änderungen speichern</button>`;
document.getElementById("emo-c").innerHTML=h;document.getElementById("emo").classList.add("vis")}
function svEd(id){const r=rp.find(x=>x.id===id);if(!r)return;r.issueType=document.getElementById("et").value;r.department=document.getElementById("edp").value;r.description=document.getElementById("edd").value;r.lastEdited=new Date().toISOString();sv();document.getElementById("emo").classList.remove("vis");render()}
